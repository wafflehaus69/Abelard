# CONSENSUS — single source of configuration (spec §5, §6).
#
# Determinism rule: no algorithm parameter is hard-coded in Python; every knob
# lives here and is validated by consensus/config.py (pydantic). This file GROWS
# one module at a time — M1 populates data_layer + categories below; the scoring,
# scan, crosswalk, alert, and unusual-activity parameter blocks (spec §6) are
# added as each module lands, so the file always reflects what actually exists
# rather than fabricating knobs for code that isn't built yet.
#
# Secrets do NOT live here (see .env.example): ETHERSCAN_API_KEY, LOG_LEVEL.

meta:
  # The US/intl regime split. Trades before this date get reduced weight in
  # scoring (M3), not deletion. Kept here now because it is a system-wide policy
  # date referenced by multiple future modules.
  regime_floor_date: "2026-06-01"

logging:
  level: INFO          # DEBUG/INFO/WARNING/ERROR; overridden by env LOG_LEVEL.

categories:
  # Target market categories for the universe/scan. Expandable.
  targets:
    - geopolitics
    - politics
    - macro

data_layer:
  # SQLite raw-response cache. Every live fetch is written here keyed by
  # (source, endpoint, params, fetch_ts); the backtest replays from this store
  # and nothing recomputes from live calls silently (spec §M1). Path is relative
  # to this config file's directory unless absolute. The parent dir is created
  # on first use; it is git-ignored.
  cache_path: "data/consensus_cache.db"

  http:
    # A descriptive UA is polite and aids the upstreams' abuse triage.
    user_agent: "CONSENSUS/0.1 (Polymarket winners-circle research; read-only)"
    timeout: 15.0
    max_retries: 3
    base_backoff: 0.5

  endpoints:
    polymarket_data_api: "https://data-api.polymarket.com"
    polymarket_gamma_api: "https://gamma-api.polymarket.com"
    polymarket_clob_api: "https://clob.polymarket.com"
    kalshi_api: "https://api.elections.kalshi.com/trade-api/v2"
    # Etherscan V2 unified multichain API (chainid=137 for Polygon PoS).
    # Standalone Polygonscan V1 (api.polygonscan.com) was sunset 2025-08-15 and
    # now 301-redirects to the migration docs — verified dead 2026-07-10.
    etherscan_v2_api: "https://api.etherscan.io/v2/api"
    # L1 archival tape: Polymarket orderbook subgraph (public, keyless GraphQL).
    # Frozen at the ~2026-04-28 exchange-contract migration with a COMPLETE
    # tape from 2022-11-21 to the boundary (verified 2026-07-12).
    goldsky_subgraph: "https://api.goldsky.com/api/public/project_cl6mb8i9h0003e201j6li0diw/subgraphs/orderbook-subgraph/prod/gn"

  # Known-good identifiers used by `consensus data smoke` (verified live
  # 2026-07-10). Override on the CLI with --market/--wallet/--kalshi-limit.
  # These may go stale as markets resolve; the smoke test is about plumbing,
  # not these specific IDs.
  smoke:
    market_condition_id: "0x500393a76a35b88f4169188c03253b8200cfa33756ae1aabf2a355529e904a7e"
    wallet_proxy: "0xeeb69a3468fedb81d1073b4187bb8b50f1d2cc67"
    kalshi_markets_limit: 5

collector:
  # M1.5 forward collector (addendum v1.2 §2) — the L2 layer. Runs single-pass
  # on an OS schedule (every hot_interval_minutes); state lives in the tape DB.
  # Design measurements (2026-07-12): global 4k window rolls in ~5 min normally,
  # ~64 s at the Feb-28 burst peak → the MARKET lane is the coverage guarantee;
  # the global lane is telemetry, stray detection, and hot-promotion only.
  tape_path: "data/l2_tape.db"

  # Gamma tag_slugs enumerated into the tracked-market roster. These are the
  # collector's coverage universe (verified live: geopolitics 601, politics
  # 1376, economy 561 markets on 2026-07-12).
  tags:
    - geopolitics
    - politics
    - economy

  enumeration_interval_minutes: 30
  gamma_page_limit: 100
  request_spacing_ms: 100    # politeness spacing between data-api requests
  page_size: 1000            # data-api hard max
  max_pages: 4               # offset cap 3000 -> at most 4 pages per walk
  global_lane_enabled: true
  envelope_log: "data/collector_envelopes.jsonl"

  # Per-invocation market-poll budget: bounds one pass to minutes under ANY
  # universe size (live enumeration: ~15k markets across the three tags).
  # Oldest-polled-first rotation drains any backlog across invocations; the
  # envelope reports due_backlog so rotation pressure is visible.
  max_markets_per_run: 500
  # After a market is first seen closed, keep polling it this long before
  # deactivating (captures the fill tail around resolution — on a resolving
  # geopolitics market that tail is exactly the data that matters).
  drain_minutes: 360
  # A lock older than this is an abandoned (crashed) run. The poll budget
  # keeps live passes far shorter than this.
  lock_stale_minutes: 30

  tiers:
    # Worst observed per-market burst rolls a 4k window in ~13.7 min; hot at
    # 2 min gives >5x margin. Dormant markets are protected by the global
    # lane's promote-on-sight (any tracked market seen in global fills is
    # hot-promoted and polled in the same invocation), so the long dormant
    # interval is safe and keeps the steady-state request rate sane.
    hot_interval_minutes: 2
    quiet_interval_minutes: 15
    dormant_interval_minutes: 360
    hot_threshold_new_fills: 50
    hot_ttl_minutes: 30
    quiet_if_fill_within_hours: 24

