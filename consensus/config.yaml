# CONSENSUS — single source of configuration (spec §5, §6).
#
# Determinism rule: no algorithm parameter is hard-coded in Python; every knob
# lives here and is validated by consensus/config.py (pydantic). This file GROWS
# one module at a time — M1 populates data_layer + categories below; the scoring,
# scan, crosswalk, alert, and unusual-activity parameter blocks (spec §6) are
# added as each module lands, so the file always reflects what actually exists
# rather than fabricating knobs for code that isn't built yet.
#
# Secrets do NOT live here (see .env.example): ETHERSCAN_API_KEY, LOG_LEVEL.

meta:
  # The US/intl regime split. Trades before this date get reduced weight in
  # scoring (M3), not deletion. Kept here now because it is a system-wide policy
  # date referenced by multiple future modules.
  regime_floor_date: "2026-06-01"

logging:
  level: INFO          # DEBUG/INFO/WARNING/ERROR; overridden by env LOG_LEVEL.

categories:
  # Target market categories for the universe/scan. Expandable.
  targets:
    - geopolitics
    - politics
    - macro

data_layer:
  # SQLite raw-response cache. Every live fetch is written here keyed by
  # (source, endpoint, params, fetch_ts); the backtest replays from this store
  # and nothing recomputes from live calls silently (spec §M1). Path is relative
  # to this config file's directory unless absolute. The parent dir is created
  # on first use; it is git-ignored.
  cache_path: "data/consensus_cache.db"

  http:
    # A descriptive UA is polite and aids the upstreams' abuse triage.
    user_agent: "CONSENSUS/0.1 (Polymarket winners-circle research; read-only)"
    timeout: 15.0
    max_retries: 3
    base_backoff: 0.5

  endpoints:
    polymarket_data_api: "https://data-api.polymarket.com"
    polymarket_gamma_api: "https://gamma-api.polymarket.com"
    polymarket_clob_api: "https://clob.polymarket.com"
    kalshi_api: "https://api.elections.kalshi.com/trade-api/v2"
    # Etherscan V2 unified multichain API (chainid=137 for Polygon PoS).
    # Standalone Polygonscan V1 (api.polygonscan.com) was sunset 2025-08-15 and
    # now 301-redirects to the migration docs — verified dead 2026-07-10.
    etherscan_v2_api: "https://api.etherscan.io/v2/api"
    # L1 archival tape: Polymarket orderbook subgraph (public, keyless GraphQL).
    # Frozen at the ~2026-04-28 exchange-contract migration with a COMPLETE
    # tape from 2022-11-21 to the boundary (verified 2026-07-12).
    goldsky_subgraph: "https://api.goldsky.com/api/public/project_cl6mb8i9h0003e201j6li0diw/subgraphs/orderbook-subgraph/prod/gn"

  # Known-good identifiers used by `consensus data smoke` (verified live
  # 2026-07-10). Override on the CLI with --market/--wallet/--kalshi-limit.
  # These may go stale as markets resolve; the smoke test is about plumbing,
  # not these specific IDs.
  smoke:
    market_condition_id: "0x500393a76a35b88f4169188c03253b8200cfa33756ae1aabf2a355529e904a7e"
    wallet_proxy: "0xeeb69a3468fedb81d1073b4187bb8b50f1d2cc67"
    kalshi_markets_limit: 5

collector:
  # M1.5 forward collector (addendum v1.2 §2) — the L2 layer. Runs single-pass
  # on an OS schedule (every hot_interval_minutes); state lives in the tape DB.
  # Design measurements (2026-07-12): global 4k window rolls in ~5 min normally,
  # ~64 s at the Feb-28 burst peak → the MARKET lane is the coverage guarantee;
  # the global lane is telemetry, stray detection, and hot-promotion only.
  tape_path: "data/l2_tape.db"

  # Gamma tag_slugs enumerated into the tracked-market roster. These are the
  # collector's coverage universe (verified live: geopolitics 601, politics
  # 1376, economy 561 markets on 2026-07-12).
  tags:
    - geopolitics
    - politics
    - economy

  enumeration_interval_minutes: 30
  gamma_page_limit: 100
  request_spacing_ms: 100    # politeness spacing between data-api requests
  page_size: 1000            # data-api hard max
  max_pages: 4               # offset cap 3000 -> at most 4 pages per walk
  global_lane_enabled: true
  envelope_log: "data/collector_envelopes.jsonl"

  # Per-invocation market-poll budget: bounds one pass to minutes under ANY
  # universe size (live enumeration: ~15k markets across the three tags).
  # Oldest-polled-first rotation drains any backlog across invocations; the
  # envelope reports due_backlog so rotation pressure is visible.
  max_markets_per_run: 500
  # After a market is first seen closed, keep polling it this long before
  # deactivating (captures the fill tail around resolution — on a resolving
  # geopolitics market that tail is exactly the data that matters).
  drain_minutes: 360
  # A lock older than this is an abandoned (crashed) run. The poll budget
  # keeps live passes far shorter than this.
  lock_stale_minutes: 30

  tiers:
    # Worst observed per-market burst rolls a 4k window in ~13.7 min; hot at
    # 2 min gives >5x margin. Dormant markets are protected by the global
    # lane's promote-on-sight (any tracked market seen in global fills is
    # hot-promoted and polled in the same invocation), so the long dormant
    # interval is safe and keeps the steady-state request rate sane.
    hot_interval_minutes: 2
    quiet_interval_minutes: 15
    dormant_interval_minutes: 360
    hot_threshold_new_fills: 50
    hot_ttl_minutes: 30
    quiet_if_fill_within_hours: 24

m5:
  # M5 funded->bet latency (addendum v1.4). Corrects the falsified P premise:
  # shared-funder identity is confounded by CEX hot wallets (~1,700-way fan-out);
  # the real signal is funded->bet LATENCY. Deliverable = the FP curve across all
  # M0-F candidates: at the latency that catches the confirmed insiders, how many
  # non-insider war-week wallets also fire?
  cex_fanout_threshold: 400          # >= this many distinct payout recipients -> CEX hot wallet
  latency_breakpoints_min: [5, 60, 1440]
  latency_scores: [1.0, 0.6, 0.2, 0.02]
  fp_curve_thresholds_min: [1, 5, 15, 60, 240, 1440]
  request_spacing_ms: 250            # Etherscan free tier ~3-5 calls/s

m0f:
  # M0-F Feb-28 footprint backtest (v1.0 §M0-F + v1.2 §3). Historical study on
  # L1 data only — no live scanning, no alerting, nothing near M9.
  # Ground truth pinned from archived liveblog metadata (see reference memo).
  news_break_ts: 1772260414          # 2026-02-28T06:33:34Z (AJ liveblog, conservative)
  window_start_ts: 1771545600        # 2026-02-20T00:00:00Z (detection window)
  window_end_ts: 1772323200          # 2026-03-01T00:00:00Z
  baseline_days: 7                   # pre-window pull for trailing-volume baselines
  # Expanded universe (v1.2 §3): strikes family + leadership + siblings.
  search_terms:
    - "us strikes iran"
    - "khamenei"
    - "iran regime"
    - "iran retaliat"
    - "strait of hormuz"
    - "iran nuclear"
    - "israel iran"
    - "ayatollah"
    - "iran war"
    - "reza pahlavi"
  # Stage-1 candidate extraction.
  size_floor_usdc: 5000              # calibration floor (live M10 default is 10k)
  directional_min: 0.8               # net/gross one-sidedness
  # Factor F freshness breakpoints (days) + prior-history discount.
  fresh_day_breakpoints: [7, 30, 90]
  fresh_scores: [1.0, 0.6, 0.2, 0.02]
  prior_fills_discount_threshold: 50
  prior_fills_discount: 0.3
  # Factor S: stake as a fraction of trailing 7d market volume; this fraction
  # maps to S=1.0.
  s_full_scale_frac: 0.05
  # Factor T (proxy: first-seen -> first-bet latency, minutes).
  t_latency_breakpoints_min: [60, 1440, 10080]
  t_scores: [1.0, 0.7, 0.3, 0.1]
  # Composite: weighted geometric mean over ACTIVE factors only (P needs the
  # funding graph; absent factors are excluded and reported, never imputed).
  factor_weights: {F: 1.0, S: 1.0, A: 0.7, D: 0.8, C: 0.8, T: 0.5, P: 1.0}
  # Cluster amplifier. v1.3 §3.2 RULING: cluster membership is dossier evidence,
  # NOT a score multiplier — in a saturated-attention regime everything clusters,
  # so boosting the composite is the dominant false-positive driver (M0-F §4).
  # Membership (per-market AND cross-market) is still computed and printed; it
  # just does not move the composite or tier while cluster_boosts_score=false.
  # Parked hypothesis (needs a 2nd labeled event): a regime-conditioned boost
  # (vs. baseline fresh-wallet rate) that self-suppresses in hot regimes.
  cluster_min: 3
  cluster_window_hours: 12
  cluster_boost: 1.5              # only applied if cluster_boosts_score=true
  cross_market_enabled: true      # compute cross-market membership for dossiers
  cluster_boosts_score: false     # v1.3 §3.2: membership does not move the score
  # Severity tiers — CALIBRATED by M0-F (docs/m0f_report.md §4/§5), PROVISIONAL
  # per v1.3 §3.1. The dominant insider (0x1caa) tops out at composite 0.48 (raw
  # F/S/D/C/T, no cluster boost), so CRITICAL=0.45 is the tightest threshold that
  # still flags it ~30h pre-news — at ~11 false positives across the war-week
  # cluster. MANDATORY RECALIBRATION when A (M8 CLOB) and P (M5 funding) land:
  # those factors are what separate a coordinated cluster from retail war-bettors.
  tier_thresholds: {WATCH: 0.25, ELEVATED: 0.35, CRITICAL: 0.45}
  # As-of ladder for detection replay (unix ts UTC).
  as_of_ladder:
    - 1772064000    # 2026-02-26T00:00:00Z
    - 1772150400    # 2026-02-27T00:00:00Z
    - 1772193600    # 2026-02-27T12:00:00Z
    - 1772236800    # 2026-02-28T00:00:00Z
    - 1772258400    # 2026-02-28T06:00:00Z
    - 1772260413    # 1s before news break
  # Press-reported wallet hypotheses (Bubblemaps via The Block/Forbes/CoinDesk).
  # HYPOTHESES until matched on-chain; the score report does the matching.
  # 0x1caA6a... was already confirmed digit-for-digit (2026-07-13 probe).
  labeled_hypotheses:
    - {name: "bubblemaps-1", address: "0x1caa6a7ad0c6916aef7b67946de2e57ad24846a0", approx_shares: 560680, approx_price: 0.108}
    - {name: "Planktonbets", approx_shares: 200747, approx_price: 0.132}
    - {name: "Dicedicedice", approx_shares: 149955, approx_price: 0.20}
    - {name: "Neodbs", approx_shares: 98838, approx_price: 0.10}
    - {name: "nothingeverhappens911", approx_price: 0.19}
    - {name: "Anon", approx_shares: 55556, approx_price: 0.18}

m0c:
  # M0-C consensus historical replay (spec v1.0 §M0-C + v1.2 §4). Replays the
  # CONSENSUS mechanic (Detector A) over L1 data with ZERO lookahead and sweeps
  # the parameters to decide GO/NO-GO. Necessary-not-sufficient: the window is
  # almost entirely pre-June-2026-split regime; the L2 forward archive runs the
  # confirmation pass later.
  replay_start_ts: 1735689600        # 2025-01-01T00:00:00Z
  replay_end_ts: 1777593600          # 2026-04-30T00:00:00Z (>= L1 freeze 2026-04-28)
  categories: [geopolitics, politics]
  # Skill scoring (M3).
  min_resolved_trades: 10            # significance floor before a wallet is scored
  decay_half_life_days: 90           # time-decay on trade edge contributions
  mm_two_sided_frac: 0.35            # >this share two-sided in a market -> MM_SUSPECT
  # Roster (M4) + scan (M6) — SWEPT (values here are the sweep centers).
  circle_size_k: 15
  participation_floor: 4
  agreement_threshold: 0.75
  max_edge_paid: 0.10                # signal EXHAUSTED if price moved past entry band + this
  entry_lag_minutes: 30             # owner-realistic fill lag from the SCAN (information time)
  rescan_cadence_days: 7
  min_position_usdc: 500            # a roster wallet must hold >=this to count as participating
  # Pilot findings (2026-07-14): without these gates the mechanic "signals"
  # 6-week-stale consensus on 99.9c favorites and earns millicents.
  freshness_window_days: 14         # consensus must have completed within this window of the scan
  price_ceiling: 0.95               # DEVIATION-FLAG: absolute payoff-room ceiling (architect to ratify)
  # Parameter sweep grid (M0-C deliverable). Each axis is a list; the harness
  # takes the product and reports expectancy per cell.
  sweep:
    participation_floor: [3, 4, 5]
    agreement_threshold: [0.7, 0.8, 0.9]
    circle_size_k: [10, 15, 25]
    max_edge_paid: [0.05, 0.10, 0.20]
  # Regime slices for sensitivity (v1.2 §4).
  regime_slices:
    - {name: "2025-H1", start: 1735689600, end: 1751328000}
    - {name: "2025-H2", start: 1751328000, end: 1767225600}
    - {name: "2026-Jan-Apr", start: 1767225600, end: 1777593600}

