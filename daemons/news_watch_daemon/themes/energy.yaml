theme_id: energy
display_name: Energy — Supply & Geopolitics
status: active
created_at: 2026-07-08

brief: |
  Tracks the geopolitics and supply security of the ENERGY complex — crude
  oil, natural gas / LNG, nuclear (fuel + generation), power / grid, coal,
  and the strategic-minerals edge of renewables. This is a supply /
  geopolitics lens, NOT an equity or broad-market lens: the signal is what
  moves molecules and electrons and the political constraints on them, plus
  the price moves that reprice supply risk.

  The thesis is that energy is the fastest-transmitting geopolitical cascade
  in the macro complex. A Strait of Hormuz threat, a refinery or pipeline strike,
  an OPEC+ output decision, a tightening of the Russian oil price cap, an LNG
  supply shock, a nuclear-plant seizure (Zaporizhzhia), or a grid failure
  reprices energy within hours and ripples into inflation, defense-industrial
  and datacenter power demand, and the fiscal position of petrostates. Supply
  is the axis; price is the readout.

  Material signals: Strait of Hormuz threats or transit disruption; strikes
  on refineries, pipelines (Druzhba, Nord Stream), export terminals, tankers,
  or LNG facilities; OPEC / OPEC+ production decisions and compliance; Russian
  crude sanctions, the G7 price cap, and shadow-fleet enforcement; natural-gas
  / LNG supply shocks and storage; nuclear reactor builds, uranium supply and
  enrichment, Rosatom / IAEA developments, Zaporizhzhia; SPR releases/refills;
  Iranian / Venezuelan sanctions and waivers; power-grid failures and capacity
  additions; named-principal statements (Novak, Saudi energy ministry, OPEC
  secretariat, Aramco, IAEA); Brent / WTI / gas price moves on a supply or
  geopolitical catalyst.

  Noise: equity price-action about energy-company SHARES (downstream, not
  supply signal), non-energy senses of the keywords (olive/cooking/palm oil,
  oil paintings, tear gas, energy drinks), routine demand-forecast recaps
  without a supply or policy catalyst, and generic "energy transition" op-eds
  absent a fresh supply, capacity, or policy fact.

  Prior thesis (updated by synthesis cycles): unset at theme creation.

keywords:
  primary:
