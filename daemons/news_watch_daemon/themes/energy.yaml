  exclusions:
    # Non-energy senses of the broad keywords.
    - "oil painting"
    - "olive oil"
    - "essential oil"
    - "cooking oil"
    - "snake oil"
    - "palm oil"
    - "tear gas"
    - "laughing gas"
    - "energy drink"
    - "energy healing"
    - "renewable energy certificate"
    # Equity price-action about energy-company SHARES — downstream, not
    # supply. Deliberately NOT excluding "rallies"/"tumbles"/"hits record" —
    # those catch COMMODITY / power-price moves, which ARE supply signal here.
    - "stocks rise"
    - "stocks fall"
    - "shares jump"
    - "shares plunge"
    - "price target"

