    - "price cap"
    - "shadow fleet"
    - "tanker"
    - "tankers"
    - "refinery"
    - "refineries"
    - "pipeline"
    - "Druzhba"
    - "barrel"
    - "barrels"
    - "bpd"
    - "oil export"
    - "oil exports"
    - "oil sanctions"
    - "oil embargo"
    - "SPR"
    - "Strategic Petroleum Reserve"
    - "Urals"
    - "diesel"
    - "gasoline"
