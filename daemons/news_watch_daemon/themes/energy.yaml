    # supply/geopolitics framing is enforced by the brief + exclusions, not
    # by keyword tightness. Lowercase = case-insensitive; OPEC/WTI/LNG are
    # case-sensitive acronyms by the matcher's rule.
    - "energy"
    - "oil"
    - "crude"
    - "Brent"
    - "WTI"
    - "OPEC"
    - "petroleum"
    - "natural gas"
    - "LNG"
    - "nuclear"
    - "uranium"
    - "electricity"
