    # AI capital-cycle language -- added 2026-06-30 (ai_capex recall widen).
    # Admits the capital-cycle / AI-trade / AI-automation phrasing the strict
    # hardware-keyword matcher missed (Lee's $880B AI bet, Korea/Japan buildouts,
    # AI investment costs, the AI boom). Written LOWERCASE on purpose: the matcher
    # makes any keyword with 2+ consecutive caps case-SENSITIVE, so "AI buildout"
    # would miss Title-Case "AI Buildouts" -- lowercase keeps these case-insensitive.
    # Plurals enumerated (the word-boundary matcher won't span them). Phrase-
    # specificity (AI + a capital-cycle word) keeps the labor/society bucket out
    # ("AI job losses" has no capex phrase); the financing wall below still
    # overrides, so an "AI IPO/listing/raise" stays suppressed.
    - "ai buildout"
