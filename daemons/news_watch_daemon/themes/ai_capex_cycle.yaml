theme_id: ai_capex_cycle
display_name: AI Capex Cycle
status: active
created_at: 2026-05-13

brief: |
  Tracks the hyperscaler-led AI infrastructure buildout: capital
  expenditure trajectories, GPU supply and allocation, datacenter
  expansion, power procurement, and the cascading second-order demand
  it creates in industrial gas, transformer manufacturing, electrical
  equipment, and uranium/natural-gas-fired generation. The investment
  thesis is that this is the largest capex cycle in modern industrial
  history, that bottlenecks shift through the supply chain as each
  constraint is resolved, and that the cycle's duration depends more on
  power availability than on chip supply.

  Material signals: hyperscaler earnings-call capex guidance changes
  (META, MSFT, GOOG, AMZN, ORCL — both raises and cuts are signal),
  NVIDIA allocation news, specific datacenter site announcements with
  capacity numbers in megawatts, power purchase agreements for nuclear
  or natural gas, transformer shortage disclosures, electrical equipment
  lead-time reports, foundry capacity announcements (TSMC, Samsung,
  Intel), specific GPU launches with allocation implications (H100,
  H200, B100, B200, GB200, successor generations), and statements from
  named principals (Jensen Huang, Sundar Pichai, Satya Nadella, Mark
  Zuckerberg, Larry Ellison).

  Noise — this theme should be aggressive about filtering: AI
  safety/policy debate without industrial substance, AGI/ASI timeline
  speculation, AI ethics discussions, "AI bubble" or "AI mania"
  framings, chatbot product launches without capacity implications, AI
  hype pieces about generic productivity gains, AI-replaces-jobs
  narratives, doom commentary, retail enthusiasm posts, and cross-asset
  price-action stories. The synthesis layer should treat policy-only and
  hype-only content as low-weight; if it doesn't carry operational
  signal about capex, capacity, allocation, or supply, it's not for this
  theme.

  Prior thesis (updated by synthesis cycles): unset at theme creation.

