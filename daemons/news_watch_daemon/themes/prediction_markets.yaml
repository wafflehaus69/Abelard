    - CFTC
    - ESMA
    - ANJ
  countries:
    - United States
    - France
    - South Korea
  commodities: []
  people:
    - Tarek Mansour
    - Shayne Coplan

synthesis:
  cadence_hours: 4
  min_headlines_to_synthesize: 4
  model: claude-sonnet-4-6
  max_tokens_output: 1000

alerts:
  # Baseline from the observed corpus: ~2/day via the existing wires, plus the
  # dedicated Google News query below. Start conservative and retune on
  # measured volume once the theme has run a few cycles.
  velocity_baseline_headlines_per_day: 8.0
  velocity_spike_multiplier: 3.0
  on_narrative_shift: true
  on_new_counter_evidence: true
  alert_channels:
    - telegram
    - abelard_queue

rss_feeds:
  # Dedicated Google News query — verified live 2026-07-19 (HTTP 200, 100
  # items/24h, keyless). The NEGATIVE terms are load-bearing: the bare query
  # returned ~50% affiliate/picks spam (promo codes, parlays, game picks from
  # Golfweek/Syracuse/CBS Sports). With the negatives it runs ~80% signal —
  # NYT/CNBC/Benzinga/qz on volume records, user growth, the France ISP block,
  # insider-trading compliance, and arbitrage spreads. Placement is
  # organizational only (global fetch-dedup by feed_id; global tagging).
  - url: "https://news.google.com/rss/search?q=%28Polymarket%20OR%20Kalshi%20OR%20%22prediction%20market%22%20OR%20%22event%20contracts%22%29%20-%22promo%20code%22%20-parlay%20-props%20-%22best%20bet%22%20-picks%20-%22how%20to%22%20when%3A24h&hl=en-US&gl=US&ceid=US:en"
    feed_id: gn_prediction_markets

