  model: claude-sonnet-4-6
  max_tokens_output: 1000

alerts:
  velocity_baseline_headlines_per_day: 8.0
  velocity_spike_multiplier: 3.0
  on_narrative_shift: true
  on_new_counter_evidence: true
  alert_channels:
    - telegram
    - abelard_queue

rss_feeds:
  # Bloomberg direct RSS — restored 2026-05-27 (Task 34 wire-feed
  # investigation). Politics feed for wire-shape coverage of US-side
  # diplomatic posture and political constraints around Iran policy.
  - url: https://feeds.bloomberg.com/politics/news.rss
    feed_id: bloomberg_politics
  # ---- NW-SRC-2 additions (2026-07-15) ----
  # Placement organizational only: global fetch-dedup by feed_id + global
  # tagging (see build_sources / orchestrator). These are cross-theme wires
  # that light us_iran hardest, so they live here, but they feed every theme.
  #
  # Google News geopolitics topic-query. Live recon (2026-07-15): 100
  # items/24h, 98 tagged to us_iran_escalation by the real matcher (also
  # lights political_volatility, energy, russia_ukraine), median age ~4h,
  # keyless. Primary intake to compensate for the dead Bloomberg politics
  # feed. Query verbatim from raw/google_news_topic_geopolitics.json.
  # robots-gray aggregator scraping; keyless; personal-use OK.
  - url: "https://news.google.com/rss/search?q=%28Iran%20OR%20%22Strait%20of%20Hormuz%22%20OR%20sanctions%20OR%20Kremlin%29%20when%3A24h&hl=en-US&gl=US&ceid=US:en"
    feed_id: gn_geopolitics
  # Al Jazeera all.xml — keyless native RSS, the only body-carrying geopolitics
  # feed proven in recon (100% description present, freshest body source at
  # ~2.6h median). ~25 items/24h, strong Middle East / us_iran. Section feeds
  # (economy.xml, middle-east/rss.xml) all 404 — all.xml is the only live
  # endpoint. Carries raw_body-adjacent signal the headline-only GN feeds lack.
  - url: https://www.aljazeera.com/xml/rss/all.xml
    feed_id: aljazeera_all

telegram_channels:
  - username: CIG_telegram
    cadence_minutes: 15
  # bloomberg removed 2026-05-27 — confirmed dormant since 2026-03-12
  # via raw Telethon (50 most-recent messages dated 2025-09 to 2026-03).
  # trading removed 2026-07-06 — forex/gold "VIP signals" spam (XAU pips,
  # tradingview promo links, enrollment CTAs); 183 msgs (~2.7% of corpus),
  # no genuine signal, and the source of the "pips" attention-table noise.
  # Ateobreaking added 2026-05-27 — bilingual Russian/English wire channel.
  # Mando reviewed 36h of content; verdict: substantial signal, Russian-
  # perspective coverage that current sources don't provide. 15-min cadence
  # justified by volume comparable to CIG_telegram. Cyrillic-only posts
  # will NOT tokenize for Pass E ATTENTION (regex is Latin-only); English
  # posts and English-translated content tokenize normally. Pass C theme
  # tagging works on English content from this channel.
  - username: Ateobreaking
    cadence_minutes: 15
    # Sponsor / promo / affiliate substrings. Case-insensitive substring match.
    # Drop-on-hit; every drop is logged INFO + appended to the noise-filter
    # audit JSONL (see config.filtered_log_path).
    #
    # History:
    #   - 2026-05-27 (Task 1): 6-pattern filter approved against a 90-headline
    #     empirical sample. Caught 7/7 known sponsor posts.
    #   - 2026-05-27 (Follow-up #2): reduced to 4 patterns after live-scrape
    #     evidence showed 67% false-positive rate in production (2 of 3 hits
    #     filtered real Russia-internet-censorship news instead of sponsors).
    #     Root cause: Ateo's editorial style includes self-attributions to
    #     their own VPN-monitoring products (Freedom Checker at
    #     freedomchecker.ateo.digital, @Ateo_help_bot) as legitimate source
    #     citations on real censorship-topic news. The ateo.digital and
    #     Ateo_help_bot patterns collided with that pattern.
    #     Trade-off: lose 2 pure-sponsor catches (/170762 blog promo,
    #     /170731 bot promo) and 2 borderline catches (/170757, /170656 —
    #     real Russia VPN news incidentally citing Freedom Checker) to
    #     eliminate the false-positive class. Asymmetric in the right
    #     direction: gain 2+ real-news posts per recurring pattern, lose
    #     2 zero-signal sponsor posts.
    noise_filter:
      - "gnuvpn"                # affiliate VPN brand
      - "durevpnbot"            # DureVPN affiliate
      - "?start=ateobreakinga"  # Ateo affiliate referral query string
                                #   (Chatty AI bots, etc.; the start= parameter
                                #   is unique to Ateo's affiliate links)
      - "#Реклама"              # Russian legal "Advertisement" disclaimer —
                                #   equivalent to "#ad" / "Sponsored content"
                                #   in EN regulatory disclosure. Forward-
                                #   covers paid promo from any future
                                #   advertiser beyond Ateo's current affiliates.
