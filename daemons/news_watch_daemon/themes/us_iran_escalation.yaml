theme_id: us_iran_escalation
display_name: U.S.–Iran Escalation
status: active
created_at: 2026-05-12

brief: |
  Tracks the trajectory of U.S.–Iran conflict and its cascade effects on
  commodities (oil, fertilizer feedstock, grains), defense procurement,
  and emerging-market risk. The thesis is that supply-chain cascades
  from kinetic events reprice fertilizer (urea, ammonia, potash),
  industrial gases, and defense primes faster than equity markets
  currently reflect.

  Vocabulary note: the discourse has hardened from "tensions" and
  "escalation" framing to "Iran war" as the operative term across
  major outlets. The synthesis layer should treat "Iran war" as the
  current consensus framing while remaining aware that the theme_id
  retains the older "escalation" naming for continuity. Track
  vocabulary shifts as themselves a signal — if framing softens back
  toward "tensions" or moves to "ceasefire," that's narrative-shift
  evidence worth surfacing.

  Material signals: military movements, sanctions changes, diplomatic
  breakdowns or progress, oil infrastructure attacks, statements from
  named principals (Khamenei, IRGC leadership, U.S. SecDef, SecState,
  CENTCOM commander, Pezeshkian), proxy actions (Houthi, Hezbollah,
  PMF), nuclear program developments, Strait of Hormuz tanker activity,
  and any movement on ceasefire frameworks.

  Noise: routine diplomatic statements, anniversary commentary, op-eds
  without new information, retail sentiment posts, generic war-fatigue
  pieces. The synthesis layer should be skeptical of articles that
  recycle prior framing without new facts. Cross-asset price-action
  stories are downstream effects tracked separately from price data,
  not signal for this theme.

  Prior thesis (updated by synthesis cycles): unset at theme creation.

