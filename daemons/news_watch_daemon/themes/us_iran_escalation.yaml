theme_id: us_iran_escalation
display_name: U.S.–Iran Escalation
status: active
created_at: 2026-05-12

brief: |
  Tracks the state of U.S.–Iran relations across kinetic, diplomatic,
  economic, and proxy dimensions. The relationship can move toward
  intensified conflict, sustained equilibrium, or normalization — all
  three are real possibilities and all three produce material events.

  Material events include, with equal weight in either direction:
    - Kinetic actions and the absence/reversal of kinetic actions
    - Diplomatic statements, openings, closures, signed agreements
    - Sanctions imposed, modified, lifted, or evaded
    - Named-principal statements that move conflict-or-resolution probability
    - Proxy activity in regional theaters (Iraq, Yemen, Lebanon, Syria, Gaza)
    - Cascade effects on oil supply, shipping insurance, defense
      procurement, central bank reaction functions
    - Accessibility of the Strait of Hormuz — open passage, threats to
      closure, actual interruption, or restoration of normal transit

  Fog of War doctrine applies symmetrically. Statements from any side —
  Iranian, U.S., European, Gulf — are positioning until matched by
  deeds. Hawkish commentary and dovish commentary are both produced by
  interested parties. Confirmation requires evidence of action, not
  evidence of intent.

  Noise: anniversary commentary, op-eds without new factual content,
  retail sentiment posts, generic war-fatigue or war-hype pieces.
  Cross-asset price-action stories are downstream effects, not signal
  for this theme.

