theme_id: russia_ukraine_war
display_name: Russia–Ukraine War
status: active
created_at: 2026-05-13

brief: |
  Tracks the trajectory of the Russia–Ukraine war: military situation,
  Western support, sanctions regime, energy supply impacts, and the
  broader implications for European defense posture and global grain
  flows. The narrative is into its fourth-plus year; the current phase
  is structural, not acute. Material changes happen at the margin —
  weapons-system commitments, sanctions enforcement shifts, energy
  infrastructure attacks, prisoner exchanges, and any movement on
  ceasefire frameworks.

  Material signals: front-line territorial changes (reported in regional
  oblast terms — Donetsk, Zaporizhzhia, Kharkiv, Kherson), Western
  weapons commitments (specific systems: ATACMS, Patriot, F-16, Taurus,
  Storm Shadow), Russian production capacity disclosures, sanctions
  package updates (EU 14th/15th/16th, U.S. OFAC actions), energy
  infrastructure strikes on either side, Black Sea grain corridor
  status, ICC actions, G7/NATO statements with operational substance,
  statements from named principals (Zelensky, Putin,
  Stoltenberg/successor, Lavrov, Kuleba).

  Noise: anniversary commentary, op-eds without new reporting, social
  media propaganda on either side without sourcing, recycled framing of
  long-known facts, retail-political "negotiate now" commentary absent
  governmental policy substance, generic war-fatigue pieces, and
  cross-asset price-action stories (those are downstream effects tracked
  separately from price data, not signal for this theme).

  Prior thesis (updated by synthesis cycles): unset at theme creation.

