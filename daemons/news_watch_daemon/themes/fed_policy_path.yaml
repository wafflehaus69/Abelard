    - "Federal Reserve Bank of Australia"  # different country

tracked_entities:
  tickers:
    - TLT                     # 20+ year treasuries
    - IEF                     # 7-10 year treasuries
    - SHY                     # 1-3 year treasuries
    - DXY                     # dollar index (proxy)
    - UUP                     # dollar ETF
    - GLD                     # gold, rate-sensitive
    - SPY                     # broad market reaction
    - QQQ                     # tech, duration-sensitive
    - XLF                     # financials
    - KRE                     # regional banks, rate-sensitive
  companies: []               # Fed-policy theme is institutional, not company-driven
  countries:
    - United States
    - Japan                   # BOJ coordination signal
    - European Union          # ECB coordination signal
    - United Kingdom          # BoE coordination signal
    - China                   # PBOC reaction signal
  commodities:
    - U.S. dollar
    - gold
    - silver
  people:
    - Jerome Powell
    - Janet Yellen
    - Scott Bessent           # if Treasury Secretary at time of read
    - Michelle Bowman
    - Christopher Waller
    - John Williams
    - Adriana Kugler
    - Lisa Cook
    - Philip Jefferson

synthesis:
  cadence_hours: 4
  min_headlines_to_synthesize: 5
  model: claude-sonnet-4-7
  max_tokens_output: 1000

alerts:
  velocity_baseline_headlines_per_day: 8.0
  velocity_spike_multiplier: 4.0   # higher multiplier — Fed news is often clustered around scheduled events
  on_narrative_shift: true
  on_new_counter_evidence: true
  alert_channels:
    - telegram
    - abelard_queue

rss_feeds: []

telegram_channels:
  - username: CIG_telegram
    cadence_minutes: 15
  - username: bloomberg
    cadence_minutes: 30
  - username: trading
    cadence_minutes: 30
