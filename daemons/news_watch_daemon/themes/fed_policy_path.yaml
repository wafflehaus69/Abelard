theme_id: fed_policy_path
display_name: Fed Policy Path
status: active
created_at: 2026-05-13

brief: |
  Tracks U.S. monetary policy trajectory: FOMC decisions, the labor and
  inflation data that drive them, balance-sheet policy, and the Fed's
  coordination posture with the Treasury and other central banks. The
  goal of this theme is to surface what the Fed is doing and what
  upstream data informs those decisions, without imposing a directional
  thesis. The synthesis layer should report what the Fed has done and
  is signaling, what the latest prints show, and how named principals
  are framing the path — leaving interpretation of "behind/ahead" or
  "tight/loose" to the reader.

  Material signals: FOMC statement releases and press conferences,
  named Fed governor speeches with policy substance (not boilerplate),
  CPI and PPI prints (headline and core, services and goods, including
  spelled-out forms like "producer prices" and "consumer prices"),
  employment situation reports (NFP, unemployment, wage growth, JOLTS),
  GDP releases, ISM manufacturing and services prints, Fed minutes
  releases, balance-sheet policy updates (QT pace, MBS runoff),
  Treasury issuance schedule changes, cross-currency-swap arrangements
  with foreign central banks, Treasury yield movements where they
  reflect policy expectations (10-year, 2s10s curve), and named
  principals (Powell, Bowman, Waller, Williams, Kugler, Cook, Jefferson,
  Daly, Kashkari, successor names as the FOMC composition changes).

  Noise: backward-looking econ punditry without forward implication,
  fringe rate-call predictions absent institutional substance, generic
  recession fearmongering, partisan commentary about the Fed's
  politicization that doesn't reference specific policy actions,
  retail-trader rate bets, and cross-asset price-action stories (those
  are downstream effects tracked separately from price data, not signal
  for this theme).

  Prior thesis (updated by synthesis cycles): unset at theme creation.

