theme_id: fed_policy_path
display_name: Fed Policy Path
status: active
created_at: 2026-05-13

brief: |
  Tracks U.S. monetary policy trajectory: FOMC decisions, the labor and
  inflation data that drive them, the terminal rate debate, balance-sheet
  policy, and the Fed's coordination posture with the Treasury and other
  central banks. The narrative is the upstream cause of nearly every
  cross-asset price movement; tracking it well anchors interpretation of
  everything else. The thesis is that the Fed is structurally behind on
  inflation in the AI-capex and onshoring era, that the natural rate is
  higher than pre-2020 priors assumed, and that cyclical cuts can occur
  inside a secularly-higher-rate regime.

  Material signals: FOMC statement releases and press conferences, named
  Fed governor speeches with policy substance (not boilerplate), CPI and
  PPI prints (headline and core, services and goods), employment situation
  reports (NFP, unemployment, wage growth, JOLTS), GDP releases, ISM
  manufacturing and services prints, Fed minutes releases, balance-sheet
  policy updates (QT pace, MBS runoff), Treasury issuance schedule changes,
  cross-currency-swap arrangements with foreign central banks, and named
  principals (Powell, Bowman, Waller, Williams, Kugler, Cook, Jefferson,
  successor names as the FOMC composition changes).

  Noise: backward-looking econ punditry without forward implication, fringe
  rate-call predictions absent institutional substance, generic recession
  fearmongering, partisan commentary about the Fed's politicization that
  doesn't reference specific policy actions, retail-trader rate bets.

  Prior thesis (updated by synthesis cycles): unset at theme creation.

keywords:
  primary:
    - "Federal Reserve"
    - "Powell"
    - "FOMC"
    - "rate cut"
    - "rate hike"
    - "interest rate"
    - "CPI"
    - "PPI"
    - "inflation"
    - "core inflation"
    - "jobs report"
    - "nonfarm payroll"
    - "unemployment rate"
    - "Fed minutes"
    - "Jackson Hole"
  secondary:
    - "Jerome Powell"
    - "Michelle Bowman"
    - "Christopher Waller"
    - "John Williams"
    - "Adriana Kugler"
    - "Lisa Cook"
    - "Philip Jefferson"
    - "Mary Daly"
    - "Neel Kashkari"
    - "balance sheet"
    - "quantitative tightening"
    - "QT"
    - "JOLTS"
    - "ISM"
    - "PCE"
    - "core PCE"
    - "terminal rate"
    - "dot plot"
    - "Beige Book"
    - "Treasury issuance"
    - "yield curve"
