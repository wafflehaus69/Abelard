  min_headlines_to_synthesize: 4
  model: claude-sonnet-4-6
  max_tokens_output: 1000

alerts:
  velocity_baseline_headlines_per_day: 4.0
  velocity_spike_multiplier: 3.0
  on_narrative_shift: true
  on_new_counter_evidence: true
  alert_channels:
    - telegram
    - abelard_queue

rss_feeds:
  # Bloomberg direct RSS — restored 2026-05-27 (Task 34 wire-feed
  # investigation). Markets feed for stablecoin/treasury/RWA market-
  # structure stories; economics feed for macro context on the same.
  - url: https://feeds.bloomberg.com/markets/news.rss
    feed_id: bloomberg_markets
  - url: https://feeds.bloomberg.com/economics/news.rss
    feed_id: bloomberg_economics
  # Cointelegraph tag feeds — wired 2026-07-07 (source-finishing order), the
  # dedicated plumbing/policy feedstock that ends this theme's starvation
  # (previously ~2 tags/cycle on bloomberg + chainlinkbreadcrumbs alone).
  # Content-verified in the 2026-07-06 recon: both keyless, ~30 items, and
  # weighted to RWA/settlement/payments-rails and crypto legislation rather
  # than BTC/ETH price action. The theme's existing price-exclusion keywords
  # strip the occasional (1-2/30) SOL/BTC price bleed. Tagging is global, so
  # these also feed any other theme a headline genuinely matches.
  - url: https://cointelegraph.com/rss/tag/tokenization
    feed_id: cointelegraph_tokenization
  - url: https://cointelegraph.com/rss/tag/regulation
    feed_id: cointelegraph_regulation

telegram_channels:
