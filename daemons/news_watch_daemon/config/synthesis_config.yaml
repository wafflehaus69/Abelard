# Synthesis-layer configuration for News Watch Daemon.
#
# Mando-tunable, deploy-overridable via NEWS_WATCH_SYNTHESIS_CONFIG env
# var pointing at a file in OpenClaw's workspace area on the Mac mini.
# This bundled copy is the default; the deploy-target copy is what
# runs in production.
#
# Pass C lands sections incrementally:
#   Step 4  →  trigger_gate          (this commit)
#   Step 8  →  synthesis (materiality)
#   Step 9  →  synthesis (model)
#   Step 10 →  drift_watcher
#   Step 6  →  alert_sink
#
# Sections not yet modeled are tolerated by Pydantic (extra="ignore" at
# top level). Sections that ARE modeled enforce extra="forbid" inside.

synthesis:
  # Default model for the synthesis call (Step 9). Per-theme override
  # via each theme YAML's `synthesis.model` field. At build time the
  # claude-api skill resolves the exact dated model id (e.g.
  # claude-sonnet-4-7-YYYYMMDD); this string is the family-name fallback.
  default_model: "claude-sonnet-4-7"

  # PLACEHOLDER (§14 calibration). Events scoring below this on
  # Sonnet's self-rated materiality are filtered out by the gate.
  materiality_threshold: 0.55

  # The materiality gate scans the Brief archive this far back for
  # duplicate-event fingerprints. Briefs older than this are not
  # consulted for dedup. PLACEHOLDER.
  dedup_window_hours: 6

  # Cap on events the synthesis prompt may emit per brief. Prevents
  # "everything is interesting" failure mode.
  max_events_per_brief: 8


trigger_gate:
  # Minimum number of new tagged headlines for a single theme to fire
  # the delta-threshold trigger. Per-theme overrides below.
  delta_threshold_default: 3
  delta_threshold_overrides:
    # us_iran_escalation is high-volume in the current corpus (Pass B
    # smoke saw 55/100 tagged); lift the bar so synthesis isn't
    # firing on routine coverage.
    us_iran_escalation: 5

  # Phrase-level signals — specificity matters. Single words like
  # "sanctions" or "strike" fire constantly; use phrases that
  # describe events, not topics. PLACEHOLDER list — calibration
  # (§14) will refine after first week of trigger_log data.
  high_signal_phrases:
    - "new sanctions"
    - "imposes sanctions"
    - "ceasefire"
    - "war declared"
    - "declares war"
    - "emergency rate cut"
    - "emergency rate hike"
    - "halts trading"
    - "suspends trading"
    - "sovereign default"
    - "central bank intervention"

  # When a single headline tags to multiple themes, treat it as
  # material by default. PROVISIONAL — Pass B smoke saw 8/100 such
  # headlines; at scale this could fire dozens of times per day.
  # Trigger_log instrumentation logs every fire so calibration can
  # raise/lower this floor.
  cross_theme_always_triggers: true


alert_sink:
  # Which sink the factory instantiates. Currently "signal" only;
  # Step 7 will land TelegramBotSink and "telegram_bot" becomes valid.
  type: signal

  signal:
    # The ONLY allowed destination. The destination-validation gate
    # in alert/signal_sink.py refuses any other value. Brief §15:
    # "Whichever ships must be the single value the SignalSink
    # destination-validation gate compares against."
    destination: "note_to_self"

    # signal-cli executable. Bare name works if on PATH; on the Mac
    # mini deploy target this resolves to /usr/local/bin/signal-cli
    # or wherever Homebrew installed it.
    cli_path: "signal-cli"

    # Subprocess timeout per invocation.
    timeout_s: 30.0

  # telegram_bot sub-section lands in Step 7. The model tolerates
  # this declaration via extra="ignore" until then.
  telegram_bot:
    bot_token_env: NWD_TG_BOT_TOKEN
    chat_id_env: NWD_TG_BOT_CHAT_ID
