  - until
  - while
  # Prepositions (positional/relational)
  - against
  - between
  - into
  - through
  - during
  - before
  - after
  - above
  - below
  - up
  - down
  - out
  - "off"         # quoted: YAML 1.1 parses bare `off` as boolean false
  - over
  - under
  - again
  - further
  - then
  - once
  - here
  - there

news_domain:
  # Attribution verbs
  - said
  - says
  - say
  - saying
  - reported
  - reports
  - report
  - reporting
  - told
  - stated
  - states
  - announced
  - announces
  - according
  - claims
  - claim
  - claimed
  # Source-attribution nouns
  - source
  - sources
  - news
  - statement
  - statements
  # Temporal fillers
  - today
  - yesterday
  - week
  - day
  - year
  - time
  - first
  - last
  - next
  # Connective filler common in news prose
  - also
  - however
  - although
  - despite
  - including
  - includes
  - included
  - per
  - via
  - amid
  - following
  # Borderline editorial filler
  - top
  # URL-syntax tokens — added 2026-05-26 in response to the Pass E live-smoke
  # calibration finding: 3 of 3 threshold-crossing terms in the first dry-run
  # were `https`, `com`, `status` (extracted by the alphabetic tokenizer from
  # URL fragments in headline text — particularly chainlinkbreadcrumbs bare
  # URLs, Google News tracker URLs from Reuters, and Telegram-embedded link
  # markdown). Surgical fix; proper architectural fix (URL-stripping pre-pass
  # in counter.tokenize) is queued for a separate scoped pass.
  - https
  - http
  - com
  - org
  - net
  - www
  - status
